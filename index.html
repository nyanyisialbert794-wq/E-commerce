<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EliteShop Business Pro</title>
        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
            }
            body{
                font-family:Arial;
                background:#0f172a;
                color:white;
                transition:.3s;
            }
            .light{
                background:#f1f5f9;
                color:#020617;
            }
            .light nav{background:#e2e8f0;}
            .light .card{
                background:#e2e8f0;
                color:#020617;
            }
            nav{
                display:flex;
                justify-content:space-between;
                align-items:center;
                padding:20px;
                background:#020617;
                position:sticky;
                top:0;
            }
            button{cursor:pointer;}
            .hero{
                text-align:center;
                padding:60px 20px;
            }
            .hero h1{
                font-size:40px;
                margin-bottom:10px;
            }
            .hero p{
                opacity:.8;
                margin-bottom:20px;
            }
            .hero button{
                padding:12px 20px;
                border:none;
                border-radius:8px;
                background:#38bdf8;
                color:white;
            }
            .products{
                display:grid;
                grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
                gap:20px;
                padding:20px;
            }
            .card{
                background:#1e293b;
                padding:15px;
                border-radius:10px;
                transition:.3s;
            }
            .card:hover{transform:translateY(-5px);}
            .card img{
                width:100%;
                height:150px;
                object-fit:cover;
                border-radius:6px;
            }
            .rating{
                color:gold;
                font-size:14px;
                margin:5px 0;
            }
            .price{
                font-weight:bold;
                margin:5px 0;
            }
            .cart-panel{
                position:fixed;
                right:-320px;
                top:0;
                width:300px;
                height:100%;
                background:#1e293b;
                padding:20px;
                transition:.3s;
                overflow:auto;
            }
            .cart-panel.active{right:0;}
            .modal{
                position:fixed;
                top:0;
                left:0;
                width:100%;
                height:100%;
                display:none;
                justify-content:center;
                align-items:center;
                background:rgba(0,0,0,.7);
            }
            .modal-content{
                background:#1e293b;
                padding:20px;
                border-radius:10px;
            }
            input{
                padding:10px;
                margin:5px;
                width:100%;
            }
            footer{
                text-align:center;
                padding:20px;
                background:#020617;
                margin-top:40px;
            }
        </style>
    </head>
    <body>
        <nav>
            <h2>EliteShop Business</h2>
            <div>
                <button onclick="toggleTheme()">🌙</button>
                <button onclick="toggleCart()">🛒</button>
                <button onclick="openLogin()">Login</button>
            </div>
        </nav>
        
        <!-- HERO SECTION -->
        <section class="hero">
            <h1>Smart Shopping Experience</h1>
            <p>Interactive, fast, and modern online store</p>
            <button onclick="scrollToProducts()">Shop Now</button>
        </section>
        
        <!-- PRODUCTS -->
        <section id="products" class="products"></section>
        
        <!-- CART -->
        <div id="cart" class="cart-panel">
            <h3>Cart</h3>
            <ul id="cartItems"></ul>
            <p>Total: $<span id="total">0</span></p>
            <button onclick="openCheckout()">Checkout</button>
        </div>
        
        <!-- CHECKOUT -->
        <div id="checkoutModal" class="modal">
            <div class="modal-content">
                <h3>Checkout</h3>
                <input placeholder="Name">
                <input placeholder="Email">
                <button onclick="pay()">Pay</button>
                <button onclick="closeCheckout()">Close</button>
            </div>
        </div>
        
        <!-- LOGIN -->
        <div id="loginModal" class="modal">
            <div class="modal-content">
                <h3>Login</h3>
                <input placeholder="Email">
                <input placeholder="Password">
                <button onclick="login()">Login</button>
                <button onclick="closeLogin()">Close</button>
            </div>
        </div>
        <footer>
            <p>&copy;2026 Albert</p>
        </footer>
        
        <script>
            const products=[
                {name:"Bluetooth Headphones, Premium Active Noise Cancelling",price:50,img:"Hadphones.jpg",rating:4},
                {name:"Sonata Sleek 6.0 Quartz Analog Watch for men, featuring a slim blue dial and a blue stainless steel strap",price:22,img:"wtch.jpg",rating:4},
                {name:"Slow-profile sneakers are a Fall Limited Edition style for casual wear with a durable rubber outer sole",price:60,img:"shoes.jpg",rating:4},
                {name:"OLEVS Mens Chronograph Watch Black Stainless Steel Chain Quartz Wrist Watches Business Dress Waterproof Luminous Date Watch from Wrist Watches",price:26,img:"Watch.jpg",rating:4},
                {name:"Men's Green Suits - Sage, Olive, Khaki | Suit Direct",price:100,img:"suit.jpg",rating:4},
                {name:"women's vibrant red evening dress suitable for special occasions",price:76,img:"dress.jpg",rating:4.5}
            ];
            let cart=JSON.parse(localStorage.getItem("cart"))||[];
            let theme=localStorage.getItem("theme")||"dark";
            if(theme==="light") document.body.classList.add("light");
            function stars(r){let s="";for(let i=1;i<=5;i++){s+=i<=r?"★":"☆"}return s}
            function renderProducts(){
                const c=document.getElementById("products");
                c.innerHTML="";
                products.forEach((p,i)=>{
                    const d=document.createElement("div");d.className="card";
                    d.innerHTML=`
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <div class="rating">${stars(p.rating)}</div>
                    <p class="price">$${p.price}</p>
                    <button onclick="add(${i})">Add to Cart</button>`;
                    c.appendChild(d);
                });
            }
            function add(i){
                const prod=products[i];
                const found=cart.find(x=>x.name===prod.name);
                if(found){found.qty++}else{cart.push({...prod,qty:1})}
                localStorage.setItem("cart",JSON.stringify(cart));
                renderCart();
            }
            function renderCart(){
                const list=document.getElementById("cartItems");
                list.innerHTML="";
                let total=0;
                cart.forEach((item,i)=>{
                    const li=document.createElement("li");
                    li.innerHTML=`${item.name} x${item.qty} - $${item.price*item.qty} <button onclick="removeItem(${i})">x</button>`;
                    list.appendChild(li);
                    total+=item.price*item.qty;
                });
                document.getElementById("total").textContent=total;
            }
            function removeItem(i){cart.splice(i,1);localStorage.setItem("cart",JSON.stringify(cart));renderCart();}
            function toggleCart(){document.getElementById("cart").classList.toggle("active")}
            function toggleTheme(){
                document.body.classList.toggle("light");
                localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");
            }
            function openCheckout(){document.getElementById("checkoutModal").style.display="flex"}
            function closeCheckout(){document.getElementById("checkoutModal").style.display="none"}
            function pay(){alert("Payment successful!");cart=[];localStorage.removeItem("cart");renderCart();closeCheckout();}
            function openLogin(){document.getElementById("loginModal").style.display="flex"}
            function closeLogin(){document.getElementById("loginModal").style.display="none"}
            function login(){alert("Logged in!");closeLogin();}
            function scrollToProducts(){document.getElementById("products").scrollIntoView({behavior:"smooth"})}
            
            renderProducts();
            renderCart();
        </script>
    </body>
</html>
